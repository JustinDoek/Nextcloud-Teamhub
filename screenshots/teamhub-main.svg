<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6f7fb"/>
      <stop offset="100%" stop-color="#e9ebf4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="800" fill="url(#bg)"/>

  <!-- Top nav bar -->
  <rect width="1280" height="50" fill="#0082c9"/>
  <text x="20" y="32" font-family="Arial" font-size="18" font-weight="bold" fill="white">☁ Nextcloud</text>
  <text x="130" y="32" font-family="Arial" font-size="15" fill="white">TeamHub</text>

  <!-- Sidebar -->
  <rect x="0" y="50" width="240" height="750" fill="#edeff4"/>
  <rect x="0" y="50" width="240" height="40" fill="#e0e3ec"/>
  <text x="12" y="76" font-family="Arial" font-size="13" fill="#0082c9" font-weight="bold">+ New Team</text>
  <text x="12" y="118" font-family="Arial" font-size="13" fill="#555">🔍 Browse Teams</text>
  <rect x="0" y="128" width="240" height="36" fill="#d5e8f5"/>
  <text x="12" y="152" font-family="Arial" font-size="13" fill="#0082c9" font-weight="bold">⬡ Engineering</text>
  <text x="12" y="190" font-family="Arial" font-size="13" fill="#777">⬡ Design</text>
  <text x="12" y="218" font-family="Arial" font-size="13" fill="#777">⬡ Marketing</text>
  <text x="12" y="246" font-family="Arial" font-size="13" fill="#777">⬡ Product</text>

  <!-- Main content area -->
  <rect x="240" y="50" width="780" height="750" fill="white"/>

  <!-- Tab bar -->
  <rect x="240" y="50" width="780" height="44" fill="#f8f9fc" rx="0"/>
  <rect x="240" y="84" width="780" height="2" fill="#e0e3ec"/>
  <rect x="248" y="54" width="80" height="30" fill="#0082c9" rx="4"/>
  <text x="270" y="74" font-family="Arial" font-size="12" fill="white">Messages</text>
  <text x="345" y="74" font-family="Arial" font-size="12" fill="#555">💬 Talk</text>
  <text x="410" y="74" font-family="Arial" font-size="12" fill="#555">📁 Files</text>
  <text x="460" y="74" font-family="Arial" font-size="12" fill="#555">📅 Calendar</text>
  <text x="535" y="74" font-family="Arial" font-size="12" fill="#555">📋 Deck</text>

  <!-- Post message form -->
  <rect x="260" y="102" width="740" height="72" fill="#f6f7fb" rx="6" stroke="#d5d9e0" stroke-width="1"/>
  <text x="278" y="125" font-family="Arial" font-size="12" fill="#888">Subject</text>
  <rect x="272" y="132" width="450" height="26" fill="white" rx="3" stroke="#c8ccd4" stroke-width="1"/>
  <text x="278" y="150" font-family="Arial" font-size="11" fill="#aaa">Message subject…</text>
  <rect x="272" y="162" width="620" height="1" fill="#ddd"/>
  <rect x="840" y="132" width="145" height="26" fill="#0082c9" rx="4"/>
  <text x="876" y="150" font-family="Arial" font-size="12" fill="white">Post Message</text>

  <!-- Message cards -->
  <!-- Card 1 -->
  <rect x="260" y="185" width="740" height="100" fill="white" rx="6" stroke="#e8eaef" stroke-width="1"/>
  <circle cx="284" cy="210" r="14" fill="#0082c9"/>
  <text x="280" y="215" font-family="Arial" font-size="11" fill="white">AK</text>
  <text x="306" y="208" font-family="Arial" font-size="13" font-weight="bold" fill="#222">Sprint 47 kickoff notes</text>
  <text x="306" y="226" font-family="Arial" font-size="11" fill="#888">Anna K · 2 hours ago</text>
  <text x="306" y="246" font-family="Arial" font-size="12" fill="#444">Velocity target: 42 pts. Three blockers identified in the retro — see full doc in Files.</text>
  <text x="306" y="268" font-family="Arial" font-size="11" fill="#0082c9">💬 4 comments</text>

  <!-- Card 2 — Poll -->
  <rect x="260" y="295" width="740" height="130" fill="white" rx="6" stroke="#e8eaef" stroke-width="1"/>
  <rect x="260" y="295" width="4" height="130" fill="#f5a623" rx="2"/>
  <circle cx="284" cy="320" r="14" fill="#e67e22"/>
  <text x="280" y="325" font-family="Arial" font-size="11" fill="white">BL</text>
  <text x="306" y="318" font-family="Arial" font-size="13" font-weight="bold" fill="#222">📊 Poll: Next team offsite location?</text>
  <text x="306" y="336" font-family="Arial" font-size="11" fill="#888">Ben L · Yesterday</text>
  <!-- Poll bars -->
  <text x="306" y="358" font-family="Arial" font-size="11" fill="#444">Amsterdam</text>
  <rect x="380" y="348" width="200" height="12" fill="#d5e8f5" rx="6"/>
  <rect x="380" y="348" width="120" height="12" fill="#0082c9" rx="6"/>
  <text x="585" y="359" font-family="Arial" font-size="10" fill="#888">60%</text>
  <text x="306" y="380" font-family="Arial" font-size="11" fill="#444">Lisbon</text>
  <rect x="380" y="370" width="200" height="12" fill="#d5e8f5" rx="6"/>
  <rect x="380" y="370" width="72" height="12" fill="#0082c9" rx="6"/>
  <text x="585" y="381" font-family="Arial" font-size="10" fill="#888">36%</text>
  <text x="306" y="402" font-family="Arial" font-size="11" fill="#888">💬 2 comments · 11 votes</text>

  <!-- Card 3 -->
  <rect x="260" y="435" width="740" height="80" fill="white" rx="6" stroke="#e8eaef" stroke-width="1"/>
  <circle cx="284" cy="460" r="14" fill="#27ae60"/>
  <text x="280" y="465" font-family="Arial" font-size="11" fill="white">MR</text>
  <text x="306" y="458" font-family="Arial" font-size="13" font-weight="bold" fill="#222">New design system components merged ✅</text>
  <text x="306" y="476" font-family="Arial" font-size="11" fill="#888">Maria R · 3 days ago</text>
  <text x="306" y="496" font-family="Arial" font-size="12" fill="#444">Button, Input, and Card components now in Storybook. Please review before next sprint.</text>

  <!-- Right sidebar -->
  <rect x="1020" y="50" width="260" height="750" fill="#f6f7fb"/>

  <!-- Team Info widget -->
  <rect x="1030" y="62" width="240" height="130" fill="white" rx="6" stroke="#e8eaef" stroke-width="1"/>
  <text x="1044" y="84" font-family="Arial" font-size="12" font-weight="bold" fill="#0082c9">Engineering</text>
  <text x="1044" y="102" font-family="Arial" font-size="11" fill="#777">Building the future, one commit at a time.</text>
  <!-- Avatar stack -->
  <circle cx="1048" cy="125" r="10" fill="#0082c9"/><text x="1044" y="129" font-family="Arial" font-size="9" fill="white">AK</text>
  <circle cx="1064" cy="125" r="10" fill="#e67e22"/><text x="1060" y="129" font-family="Arial" font-size="9" fill="white">BL</text>
  <circle cx="1080" cy="125" r="10" fill="#27ae60"/><text x="1076" y="129" font-family="Arial" font-size="9" fill="white">MR</text>
  <circle cx="1096" cy="125" r="10" fill="#9b59b6"/><text x="1092" y="129" font-family="Arial" font-size="9" fill="white">+4</text>
  <text x="1048" y="178" font-family="Arial" font-size="11" fill="#888">7 members</text>

  <!-- Calendar widget -->
  <rect x="1030" y="202" width="240" height="140" fill="white" rx="6" stroke="#e8eaef" stroke-width="1"/>
  <text x="1044" y="222" font-family="Arial" font-size="12" font-weight="bold" fill="#0082c9">📅 Upcoming Events</text>
  <rect x="1038" y="230" width="224" height="1" fill="#eee"/>
  <text x="1044" y="250" font-family="Arial" font-size="11" fill="#222">Sprint Planning</text>
  <text x="1044" y="264" font-family="Arial" font-size="10" fill="#888">Mon 25 Feb · 10:00</text>
  <text x="1044" y="284" font-family="Arial" font-size="11" fill="#222">Design Review</text>
  <text x="1044" y="298" font-family="Arial" font-size="10" fill="#888">Tue 26 Feb · 14:00</text>
  <text x="1044" y="318" font-family="Arial" font-size="11" fill="#222">Quarterly OKR check-in</text>
  <text x="1044" y="332" font-family="Arial" font-size="10" fill="#888">Thu 28 Feb · 09:00</text>

  <!-- Deck widget -->
  <rect x="1030" y="352" width="240" height="120" fill="white" rx="6" stroke="#e8eaef" stroke-width="1"/>
  <text x="1044" y="372" font-family="Arial" font-size="12" font-weight="bold" fill="#0082c9">📋 Tasks Due Soon</text>
  <rect x="1038" y="380" width="224" height="1" fill="#eee"/>
  <text x="1044" y="400" font-family="Arial" font-size="11" fill="#222">• API rate limiter</text>
  <text x="1044" y="414" font-family="Arial" font-size="10" fill="#e74c3c">Overdue · Anna K</text>
  <text x="1044" y="434" font-family="Arial" font-size="11" fill="#222">• Accessibility audit</text>
  <text x="1044" y="448" font-family="Arial" font-size="10" fill="#888">Due tomorrow · Maria R</text>

  <!-- Web Links widget -->
  <rect x="1030" y="482" width="240" height="100" fill="white" rx="6" stroke="#e8eaef" stroke-width="1"/>
  <text x="1044" y="502" font-family="Arial" font-size="12" font-weight="bold" fill="#0082c9">🔗 Web Links</text>
  <rect x="1038" y="510" width="224" height="1" fill="#eee"/>
  <text x="1044" y="530" font-family="Arial" font-size="11" fill="#0082c9">Confluence Docs</text>
  <text x="1044" y="550" font-family="Arial" font-size="11" fill="#0082c9">Figma Design System</text>
  <text x="1044" y="570" font-family="Arial" font-size="11" fill="#0082c9">GitHub Repository</text>
</svg>
