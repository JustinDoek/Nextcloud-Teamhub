name: Publish to Nextcloud App Store

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.14.1'

      - name: Install dependencies and build JS
        run: |
          npm install
          npm run build

      - name: Create App Folder for Signer
        # Dit verplaatst je code naar de juiste map voor de R0Wi tool
        run: |
          mkdir teamhub
          find . -maxdepth 1 ! -name 'teamhub' ! -name '.' ! -name '..' -exec mv {} teamhub/ \;

      - name: Sign and Package App
        uses: R0Wi/nextcloud-appstore-push-action@v1.0.1
        with:
          app_name: teamhub
          app_private_key: ${{ secrets.NEXTCLOUD_KEY }}
          appstore_token: ${{ secrets.NEXTCLOUD_TOKEN }}