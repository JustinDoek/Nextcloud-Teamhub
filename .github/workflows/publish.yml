name: Publish to Nextcloud App Store

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.14.1'

      - name: Install dependencies and build JS
        run: 4
          npm install
          npm run build

      - name: Prepare app for release
        run: |
          # Verwijder development bestanden om de app schoon te houden
          rm -rf node_modules
          rm -rf .github
          rm -rf .git
          # (Optioneel) Voeg hier andere mappen toe die niet in de release horen

      - name: Sign and Package App
        # We gebruiken hier de actie die in de Nextcloud docs wordt aangeraden
        uses: R0Wi/nextcloud-appstore-push-action@v2
        with:
          app_name: teamhub
          app_private_key: ${{ secrets.NEXTCLOUD_KEY }}
          appstore_token: ${{ secrets.NEXTCLOUD_TOKEN }}
          # De actie maakt zelf de tarball en de signature.json aan