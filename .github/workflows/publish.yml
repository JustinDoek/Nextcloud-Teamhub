name: Publish to Nextcloud App Store

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.14.1'

      - name: Install dependencies and build JS
        run: |
          npm install
          npm run build

      - name: Check and Sign App
        # Deze actie maakt de tarball, ondertekent hem en uploadt hem naar de GitHub Release
        uses: skjnldsv/nextcloud-app-publishing@v2.1.4
        with:
          app-name: teamhub
          nextcloud-key: ${{ secrets.NEXTCLOUD_KEY }}
          nextcloud-certificate: ${{ secrets.NEXTCLOUD_CERT }}
          token: ${{ secrets.NEXTCLOUD_TOKEN }}